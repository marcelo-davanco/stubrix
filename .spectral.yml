extends:
  - spectral:oas

rules:
  stubrix-operation-id:
    description: "All operations must have an operationId"
    given: "$.paths[*][get,post,put,patch,delete,head,options]"
    severity: warn
    then:
      field: operationId
      function: truthy

  stubrix-response-success:
    description: "Operations must define at least one 2xx response"
    given: "$.paths[*][get,post,put,patch,delete]"
    severity: warn
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          type: object
          patternProperties:
            "^2[0-9]{2}$":
              type: object
          minProperties: 1

  stubrix-no-empty-description:
    description: "Operations should have a non-empty summary or description"
    given: "$.paths[*][get,post,put,patch,delete]"
    severity: info
    then:
      field: summary
      function: truthy
