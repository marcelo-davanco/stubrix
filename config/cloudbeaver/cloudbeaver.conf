{
    "server": {
        "serverPort": 8978,
        "workspaceLocation": "/opt/cloudbeaver/workspace",
        "contentRoot": "/opt/cloudbeaver/web",
        "driversLocation": "/opt/cloudbeaver/drivers",
        "rootURI": "/",
        "serviceURI": "/api/",
        "productConfiguration": "/opt/cloudbeaver/conf/product.conf",
        "expireSessionAfterPeriod": 1800000,
        "develMode": false,
        "enableSecurityManager": false,
        "database": {
            "driver": "h2_embedded",
            "url": "jdbc:h2:/opt/cloudbeaver/workspace/.data/cloudbeaver",
            "createDatabase": true
        }
    },
    "app": {
        "anonymousAccessEnabled": true,
        "anonymousUserRole": "user",
        "grantConnectionsAccessToAnonymousTeam": true,
        "supportsCustomConnections": true,
        "showReadOnlyConnectionInfo": false,
        "notificationsEnabled": true
    }
}
