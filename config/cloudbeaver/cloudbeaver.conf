{
    "server": {
        "serverPort": 8978,
        "workspaceLocation": "${CLOUDBEAVER_WORKSPACE_DIR:-/opt/cloudbeaver/workspace}",
        "contentRoot": "${CLOUDBEAVER_CONTENT_ROOT:-/opt/cloudbeaver/web}",
        "driversLocation": "${CLOUDBEAVER_DRIVERS_DIR:-/opt/cloudbeaver/drivers}",
        "rootURI": "${CLOUDBEAVER_ROOT_URI:-/}",
        "serviceURI": "/api/",
        "productConfiguration": "${CLOUDBEAVER_PRODUCT_CONF:-/opt/cloudbeaver/conf/product.conf}",
        "expireSessionAfterPeriod": ${CLOUDBEAVER_SESSION_EXPIRE:-1800000},
        "develMode": false,
        "enableSecurityManager": false,
        "database": {
            "driver": "h2_embedded",
            "url": "jdbc:h2:${CLOUDBEAVER_WORKSPACE_DIR:-/opt/cloudbeaver/workspace}/.data/cloudbeaver",
            "createDatabase": true
        }
    },
    "app": {
        "anonymousAccessEnabled": ${CLOUDBEAVER_ANONYMOUS_ACCESS:-true},
        "anonymousUserRole": "user",
        "grantConnectionsAccessToAnonymousTeam": true,
        "supportsCustomConnections": ${CLOUDBEAVER_CUSTOM_CONNECTIONS:-true},
        "showReadOnlyConnectionInfo": false,
        "notificationsEnabled": true
    }
}
